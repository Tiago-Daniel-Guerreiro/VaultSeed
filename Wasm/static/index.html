<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VaultSeed</title>
    <link rel="icon" type="image/png" href="./icon.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #111; overflow: hidden; }

      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 2;
        background: transparent;
      }

      header {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        color: #ddd;
        font-family: sans-serif;
        text-align: center;
      }
      
      header img { 
        display: block; 
        margin: 0 auto 16px; 
        width: 256px; 
        height: 256px; 
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" tabindex="0" alt="VaultSeed"></canvas>

    <header>
      <img src="./icon.png" alt="VaultSeed" />
      A carregar...
    </header>

    <script type="module" src="./index.js"></script>
  </body>
</html>
