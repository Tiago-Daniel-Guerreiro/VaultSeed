<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VaultSeed</title>
    <link rel="icon" type="image/png" href="./icon.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
      }
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        color: #ddd;
        font-size: 1.1rem;
        font-weight: 500;
      }
      header img {
        width: 32px;
        height: 32px;
        border-radius: 6px;
      }
      canvas {
        display:       block;
        border-radius: 6px;
        box-shadow:    0 4px 24px rgba(0,0,0,0.5);
        width:         min(95vw, 1100px);
        height:        min(90vh, 720px);
      }
    </style>
  </head>
  <body>
    <header>
      <img src="./icon.png" alt="VaultSeed" />
      VaultSeed
    </header>
    <canvas id="canvas" width="400" height="600"></canvas>
    <script type="module" src="./index.js"></script>
  </body>
</html>
