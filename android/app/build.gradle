plugins {
    id 'com.android.application'
}

android {
    namespace 'com.projetopap.vaultseed'
    compileSdk 35

    defaultConfig {
        applicationId 'com.projetopap.vaultseed'
        minSdk 26
        targetSdk 35
        versionCode 20
        versionName '0.5.4'

        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
        }
        debug {
            debuggable true
        }
    }

    sourceSets {
        main {
            manifest.srcFile 'src/main/AndroidManifest.xml'
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
}

dependencies {
}